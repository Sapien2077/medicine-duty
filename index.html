<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6th Sem Medicine Posting Duty</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --bg-white: #FFFFFF;
            --notion-bg: #f7f7f5;
            --notion-text: #37352f;
            --notion-gray: #787774;
            --notion-border: rgba(55, 53, 47, 0.16);
            --sage-accent: #849C8A;
            --notion-hover: #efefed;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-white);
            color: var(--notion-text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .workspace { max-width: 900px; width: 100%; }

        header { margin-bottom: 48px; }

        h1 {
            font-size: 40px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
            display: inline-block;
            /* Subtle minimal highlight underline */
            background-image: linear-gradient(transparent 70%, rgba(132, 156, 138, 0.3) 70%);
        }

        .date-display { font-size: 16px; color: var(--notion-gray); font-weight: 400; margin-top: 10px; }

        .section-header {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--notion-gray);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 32px 0 12px 0;
            border-bottom: 2px solid rgba(132, 156, 138, 0.2); /* Section highlight */
            padding-bottom: 4px;
            width: fit-content;
        }

        .callout {
            background: var(--notion-bg);
            border-radius: 4px;
            padding: 24px;
            display: flex;
            gap: 16px;
            border: 1px solid transparent;
        }

        .callout-icon { font-size: 24px; }
        .callout-content h2 { margin: 0 0 12px 0; font-size: 1.5em; }

        .member-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .chip {
            background: rgba(132, 156, 138, 0.15);
            color: #4a5d4e;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
        }

        .table-container { width: 100%; overflow-x: auto; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--notion-border); color: var(--notion-gray); font-weight: 500; }
        td { padding: 12px 8px; border-bottom: 1px solid #efefef; vertical-align: top; }

        .active-row { background-color: #f1f1ef; }
        .holiday { color: #d44c47; background: #fbe4e4; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 700; }

        .directory { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        .directory-card { border: 1px solid var(--notion-border); border-radius: 4px; padding: 16px; transition: background 0.2s; }
        .directory-card:hover { background: var(--notion-hover); }
        .directory-card h4 { margin: 0 0 8px 0; font-size: 14px; color: var(--notion-gray); }
        .directory-card p { margin: 0; font-size: 14px; line-height: 1.5; }

        @media (max-width: 600px) {
            body { padding: 24px 16px; }
            h1 { font-size: 32px; }
            .callout { flex-direction: column; gap: 8px; }
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

    <div class="workspace">
        <header>
            <h1>🗓️ 6th Sem Medicine Posting Duty</h1>
            <div class="date-display" id="current-date">Loading...</div>
        </header>

        <div class="section-header">Today's Focus</div>
        <div class="callout">
            <div class="callout-icon">📋</div>
            <div class="callout-content">
                <h2 id="today-group">Loading...</h2>
                <div class="member-chips" id="today-members"></div>
                <div style="margin-top: 20px;">
                    <span id="today-sl" style="font-weight: bold; color: var(--notion-gray);">#</span>
                    <span id="today-topic" style="font-weight: 500;"></span>
                    <p id="today-teacher" style="font-size: 14px; color: var(--notion-gray); margin: 4px 0 0 20px;"></p>
                </div>
            </div>
        </div>

        <div class="section-header">April Schedule</div>
        <div class="table-container">
            <table id="schedule-table">
                <thead>
                    <tr>
                        <th>Sl.</th>
                        <th>Date</th>
                        <th>Group</th>
                        <th>Clinical Topic</th>
                        <th>Teacher</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section-header">Class Directory</div>
        <div class="directory" id="directory-grid"></div>
    </div>

    <script>
        const groups = [
            { name: "Group 1", members: ["Sathwik", "Srinand", "Varshita", "Vishlesh"] },
            { name: "Group 2", members: ["Chitta", "Nishita", "Chandrapal", "BG"] },
            { name: "Group 3", members: ["Arkadeep", "Arya", "Ayush Abhilash", "Jathin"] },
            { name: "Group 4", members: ["Barenya", "Gouri", "Gopal"] },
            { name: "Group 5", members: ["Ayush Dash", "Sravani Chidvilas", "Jaswanth"] },
            { name: "Group 6", members: ["Ayushmita", "Hongseng", "Gautam", "Keerthi"] }
        ];

        // Ensure these dates are sorted chronologically
        const scheduleData = {
            "2026-04-09": { topic: "Nervous system Exam", teacher: "Faculty" },
            "2026-04-10": { topic: "Rheumatological exam", teacher: "Resident" },
            "2026-04-11": { topic: "GI examination", teacher: "Faculty" },
            "2026-04-12": { topic: "Holiday", teacher: "" },
            "2026-04-13": { topic: "Respiratory system exam", teacher: "Resident" },
            "2026-04-14": { topic: "Cardiovascular system Exam", teacher: "Faculty" },
            "2026-04-15": { topic: "Nervous system Exam", teacher: "Resident" },
            "2026-04-16": { topic: "Rheumatological exam", teacher: "Faculty" },
            "2026-04-17": { topic: "GI examination", teacher: "Resident" },
            "2026-04-18": { topic: "Respiratory system exam", teacher: "Faculty" },
            "2026-04-19": { topic: "Holiday", teacher: "" },
            "2026-04-20": { topic: "Cardiovascular system Exam", teacher: "Resident" },
            "2026-04-21": { topic: "Nervous system Exam", teacher: "Resident" },
            "2026-04-22": { topic: "Rheumatological exam", teacher: "Resident" },
            "2026-04-23": { topic: "GI examination", teacher: "Resident" },
            "2026-04-24": { topic: "Respiratory system exam", teacher: "Faculty" },
            "2026-04-25": { topic: "Cardiovascular system Exam", teacher: "Resident" },
            "2026-04-26": { topic: "Holiday", teacher: "" },
            "2026-04-27": { topic: "Nervous system Exam", teacher: "Resident" },
            "2026-04-28": { topic: "Rheumatological exam", teacher: "Faculty" },
            "2026-04-29": { topic: "GI examination", teacher: "Resident" },
            "2026-04-30": { topic: "Respiratory system exam", teacher: "Faculty" }
        };

        function init() {
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            document.getElementById('current-date').innerText = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

            const tbody = document.querySelector('#schedule-table tbody');
            
            // LOGIC FIX: Maintain a "activeClassDay" counter that ONLY increments on non-holidays
            let activeClassDayCounter = 0;

            Object.entries(scheduleData).forEach(([dateStr, data]) => {
                const rowDate = new Date(dateStr + 'T00:00:00');
                const isHoliday = data.topic.toLowerCase().includes("holiday");
                
                let assignedGroup = "";
                let currentClassNumber = "-";

                if (!isHoliday) {
                    // Only calculate a group and increment counter if it's NOT a holiday
                    assignedGroup = groups[activeClassDayCounter % groups.length].name;
                    activeClassDayCounter++; // The counter only moves forward for valid classes
                    currentClassNumber = activeClassDayCounter;
                }

                // Table Render
                const tr = document.createElement('tr');
                if (dateStr === todayStr) tr.className = 'active-row';
                
                tr.innerHTML = `
                    <td style="color:var(--notion-gray)">${currentClassNumber}</td>
                    <td style="white-space:nowrap">${rowDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</td>
                    <td style="font-weight:600">${isHoliday ? '' : assignedGroup}</td>
                    <td>${isHoliday ? '<span class="holiday">HOLIDAY</span>' : data.topic}</td>
                    <td style="color:var(--notion-gray)">${data.teacher}</td>
                `;
                tbody.appendChild(tr);

                // Today Card Logic
                if (dateStr === todayStr) {
                    if (isHoliday) {
                        document.getElementById('today-group').innerText = "It's a Holiday";
                        document.getElementById('today-topic').innerText = "Rest up!";
                    } else {
                        const g = groups[(activeClassDayCounter - 1) % groups.length];
                        document.getElementById('today-group').innerText = g.name;
                        document.getElementById('today-sl').innerText = currentClassNumber + ". ";
                        document.getElementById('today-topic').innerText = data.topic;
                        document.getElementById('today-teacher').innerText = "Teacher: " + data.teacher;
                        
                        const container = document.getElementById('today-members');
                        g.members.forEach(m => {
                            const span = document.createElement('span');
                            span.className = 'chip';
                            span.innerText = m;
                            container.appendChild(span);
                        });
                    }
                }
            });

            // Directory Render
            const dir = document.getElementById('directory-grid');
            groups.forEach(g => {
                const card = document.createElement('div');
                card.className = 'directory-card';
                card.innerHTML = `<h4>${g.name}</h4><p>${g.members.join(', ')}</p>`;
                dir.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
